<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GodMaster Mobile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      background: #0a0a0a;
      color: #00ff00;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Üst Bar ── */
    #topbar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; font-weight: 700; color: #00ff00; flex: 1; }

    select {
      background: #2a2a2a;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 5px 6px;
      font-size: 12px;
      -webkit-appearance: none;
      appearance: none;
    }
    #clear-btn {
      background: #2a2a2a;
      color: #ff5555;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #clear-btn:active { background: #3a1a1a; }

    /* ── Ses animasyonu (getUserMedia YOK — çakışma önlendi) ── */
    #vu-wrap {
      height: 6px;
      background: #111;
      flex-shrink: 0;
      overflow: hidden;
    }
    #vu-bar {
      height: 6px;
      width: 0%;
      background: linear-gradient(90deg, #00aa00, #00ff00);
      transition: width 0.1s;
    }
    #vu-bar.active {
      animation: vuAnim 1.2s ease-in-out infinite;
    }
    @keyframes vuAnim {
      0%   { width: 20%; }
      25%  { width: 70%; }
      50%  { width: 45%; }
      75%  { width: 85%; }
      100% { width: 20%; }
    }

    /* ── Çıktı ── */
    #output {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.7;
      word-break: break-word;
    }
    #interim { color: #007700; font-style: italic; }

    /* ── Font Slider ── */
    #font-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    #font-wrap label { font-size: 11px; color: #555; white-space: nowrap; }
    #font-slider { flex: 1; accent-color: #00ff00; height: 20px; }

    /* ── Alt Kontrol ── */
    #controls {
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 14px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #00ff00;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      touch-action: manipulation;
      transition: background 0.2s;
    }
    #mic-btn.active {
      background: #002200;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #mic-btn svg { width: 34px; height: 34px; fill: #00ff00; pointer-events: none; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px #00ff0033; }
      50%      { box-shadow: 0 0 28px #00ff0099; }
    }

    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      line-height: 1.5;
      min-height: 18px;
    }
    #status.on   { color: #00cc00; }
    #status.err  { color: #ff4444; }
    #status.warn { color: #ffaa00; }

    /* ── Debug kutusu (geliştirici için, üste tıklayınca açılır) ── */
    #debug {
      display: none;
      position: fixed;
      bottom: 160px;
      left: 10px; right: 10px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px;
      font-size: 10px;
      color: #888;
      max-height: 100px;
      overflow-y: auto;
      z-index: 999;
    }

    /* ── Destek yok ── */
    #no-support {
      display: none;
      padding: 40px 24px;
      text-align: center;
      color: #ff4444;
      font-size: 14px;
      line-height: 2;
    }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🎮 GodMaster</h1>
  <select id="lang-select">
    <option value="tr-TR" selected>🇹🇷 Türkçe</option>
    <option value="en-US">🇺🇸 English</option>
    <option value="de-DE">🇩🇪 Deutsch</option>
    <option value="es-ES">🇪🇸 Español</option>
    <option value="fr-FR">🇫🇷 Français</option>
  </select>
  <button id="clear-btn">Temizle</button>
</div>

<div id="vu-wrap"><div id="vu-bar"></div></div>

<div id="output">
  <span id="final-text"></span><span id="interim"></span>
</div>

<div id="font-wrap">
  <label>Yazı:</label>
  <input type="range" id="font-slider" min="14" max="36" value="20" />
</div>

<div id="controls">
  <div id="mic-btn" role="button" aria-label="Mikrofonu Başlat">
    <svg viewBox="0 0 24 24">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 
               17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 
               0H4a8 8 0 0 0 7 7.93z"/>
    </svg>
  </div>
  <div id="status">Başlamak için dokun</div>
</div>

<div id="no-support">
  ⚠️ Tarayıcınız ses tanımayı desteklemiyor.<br/>
  <b>Android</b> → Chrome kullanın<br/>
  <b>iPhone/iPad</b> → Safari kullanın<br/><br/>
  İnternet bağlantısı gereklidir.
</div>

<div id="debug"></div>

<script>
(function () {
  'use strict';

  // ── Platform ──
  const ua        = navigator.userAgent;
  const isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/.test(ua);

  // ── Debug (başlığa 3x hızlı dokununca açılır) ──
  let tapCount = 0;
  const debugEl = document.getElementById('debug');
  document.getElementById('topbar').addEventListener('click', () => {
    tapCount++;
    if (tapCount >= 3) { tapCount = 0; debugEl.style.display = debugEl.style.display === 'none' ? 'block' : 'none'; }
    setTimeout(() => { tapCount = 0; }, 800);
  });
  function dbg(msg) {
    const d = new Date();
    const t = d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
    debugEl.innerHTML = `<div>[${t}] ${msg}</div>` + debugEl.innerHTML;
  }

  // ── Speech Recognition kontrolü ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('no-support').style.display  = 'block';
    document.getElementById('controls').style.display    = 'none';
    document.getElementById('font-wrap').style.display   = 'none';
    return;
  }

  // ── Elemanlar ──
  const micBtn     = document.getElementById('mic-btn');
  const statusEl   = document.getElementById('status');
  const finalEl    = document.getElementById('final-text');
  const interimEl  = document.getElementById('interim');
  const vuBar      = document.getElementById('vu-bar');
  const output     = document.getElementById('output');
  const langSelect = document.getElementById('lang-select');
  const fontSlider = document.getElementById('font-slider');

  let isRunning    = false;
  let recognition  = null;
  let restartTimer = null;
  let stopping     = false;
  let finalText    = '';

  // ── Font ──
  fontSlider.addEventListener('input', () => {
    output.style.fontSize = fontSlider.value + 'px';
  });

  // ── Temizle ──
  document.getElementById('clear-btn').addEventListener('click', () => {
    finalText = '';
    finalEl.textContent   = '';
    interimEl.textContent = '';
  });

  // ── Buton dokunuş — hem touchend hem click (duplicate önlendi) ──
  let lastToggle = 0;
  function handleToggle(e) {
    e.preventDefault();
    const now = Date.now();
    if (now - lastToggle < 300) return;   // debounce
    lastToggle = now;
    if (isRunning) stopAll(); else startAll();
  }
  micBtn.addEventListener('touchend', handleToggle, { passive: false });
  micBtn.addEventListener('click',    handleToggle);

  // ── BAŞLAT ──
  function startAll() {
    isRunning = false; // createAndStart içinde true yapılacak
    stopping  = false;
    micBtn.classList.add('active');
    vuBar.classList.add('active');
    setStatus('🔴 Dinleniyor...', 'on');
    dbg('startAll');
    createAndStart();
  }

  // ── DURDUR ──
  function stopAll() {
    dbg('stopAll');
    stopping  = true;
    isRunning = false;
    clearTimeout(restartTimer);
    micBtn.classList.remove('active');
    vuBar.classList.remove('active');
    interimEl.textContent = '';
    setStatus('Başlamak için dokun', '');
    if (recognition) {
      try { recognition.abort(); } catch (e) {}
      recognition = null;
    }
  }

  // ── Tanıma Döngüsü ──
  function createAndStart() {
    if (stopping) return;

    if (recognition) {
      try { recognition.abort(); } catch (e) {}
      recognition = null;
    }

    const r    = new SR();
    recognition = r;

    r.lang           = langSelect.value;
    r.interimResults = true;
    r.maxAlternatives = 1;

    // TEMEL FARK:
    // Android: continuous=false + elle döngü (en güvenilir)
    // iOS:     continuous=true  (Safari böyle daha iyi çalışır)
    r.continuous = isIOS;

    dbg(`start lang=${r.lang} continuous=${r.continuous} platform=${isIOS?'iOS':isAndroid?'Android':'Desktop'}`);

    r.onstart = () => {
      isRunning = true;
      dbg('onstart OK');
      setStatus('🔴 Dinleniyor...', 'on');
    };

    r.onsoundstart = () => { dbg('soundstart'); };
    r.onspeechstart= () => { dbg('speechstart'); };

    r.onresult = (e) => {
      dbg(`onresult idx=${e.resultIndex} len=${e.results.length}`);
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        dbg(`  result[${i}] final=${e.results[i].isFinal} text="${t}"`);
        if (e.results[i].isFinal) {
          finalText += t + '\n';
        } else {
          interim = t;
        }
      }
      finalEl.textContent   = finalText;
      interimEl.textContent = interim;
      output.scrollTop = output.scrollHeight;
    };

    r.onerror = (e) => {
      dbg(`onerror: ${e.error}`);
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        setStatus('⚠ Mikrofon izni reddedildi', 'err');
        stopAll(); return;
      }
      if (e.error === 'network') {
        setStatus('⚠ İnternet bağlantısı gerekli', 'err');
        stopAll(); return;
      }
      if (e.error === 'audio-capture') {
        setStatus('⚠ Mikrofon bulunamadı', 'err');
        stopAll(); return;
      }
      // aborted / no-speech → normal, döngü onend'de devam eder
    };

    r.onend = () => {
      isRunning = false;
      interimEl.textContent = '';
      dbg(`onend stopping=${stopping}`);
      if (stopping) return;

      // Yeniden başlat: Android 350ms, iOS 200ms
      const delay = isIOS ? 200 : 350;
      restartTimer = setTimeout(createAndStart, delay);
    };

    try {
      r.start();
    } catch (err) {
      dbg(`start hata: ${err.message}`);
      restartTimer = setTimeout(createAndStart, 500);
    }
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = cls || '';
  }

  // ── Sayfa arka plana geçince ──
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && isRunning) {
      dbg('visibility hidden');
      setStatus('⏸ Arka planda duraklatıldı', 'warn');
      if (recognition) try { recognition.abort(); } catch(e) {}
    } else if (!document.hidden && !stopping && micBtn.classList.contains('active')) {
      dbg('visibility visible — resume');
      setStatus('🔴 Dinleniyor...', 'on');
      clearTimeout(restartTimer);
      restartTimer = setTimeout(createAndStart, 400);
    }
  });

})();
</script>
</body>
</html>
