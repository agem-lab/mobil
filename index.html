<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GodMaster Mobile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #00ff00;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; font-weight: 700; color: #00ff00; flex: 1; }

    select, #clear-btn {
      background: #2a2a2a;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    #clear-btn { color: #ff5555; }
    #clear-btn:active { background: #3a1a1a; }

    #vu-wrap { height: 4px; background: #111; flex-shrink: 0; }
    #vu-bar  { height: 4px; width: 0%; background: #00ff00; transition: width 0.08s; }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.7;
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
    }
    #interim { color: #007700; font-style: italic; }

    #font-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      flex-shrink: 0;
      background: #111;
    }
    #font-wrap label { font-size: 11px; color: #555; white-space: nowrap; }
    #font-slider { flex: 1; accent-color: #00ff00; }

    #controls {
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid #00ff00;
      background: #111;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #mic-btn.active {
      background: #002200;
      box-shadow: 0 0 24px #00ff0066;
      animation: pulse 1.4s infinite;
    }
    #mic-btn svg { width: 34px; height: 34px; fill: #00ff00; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px #00ff0033; }
      50%      { box-shadow: 0 0 28px #00ff0099; }
    }

    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      min-height: 18px;
    }
    #status.on  { color: #00cc00; }
    #status.err { color: #ff4444; }

    #no-support {
      display: none;
      padding: 30px;
      text-align: center;
      color: #ff4444;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🎮 GodMaster</h1>
  <select id="lang-select">
    <option value="tr-TR" selected>🇹🇷 Türkçe</option>
    <option value="en-US">🇺🇸 English</option>
    <option value="de-DE">🇩🇪 Deutsch</option>
    <option value="es-ES">🇪🇸 Español</option>
    <option value="fr-FR">🇫🇷 Français</option>
  </select>
  <button id="clear-btn">Temizle</button>
</div>

<div id="vu-wrap"><div id="vu-bar"></div></div>

<div id="output">
  <span id="final-text"></span><span id="interim"></span>
</div>

<div id="font-wrap">
  <label>Yazı Boyutu:</label>
  <input type="range" id="font-slider" min="14" max="36" value="20" />
</div>

<div id="controls">
  <div id="mic-btn">
    <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg>
  </div>
  <div id="status">Başlamak için dokun</div>
</div>

<div id="no-support">
  ⚠️ Tarayıcınız ses tanımayı desteklemiyor.<br/>
  Lütfen <b>Chrome</b> (Android) veya <b>Safari</b> (iPhone) kullanın.<br/><br/>
  İnternet bağlantısı gereklidir.
</div>

<script>
  // ── Destek Kontrolü ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('no-support').style.display = 'block';
    document.getElementById('controls').style.display  = 'none';
    document.getElementById('font-wrap').style.display = 'none';
  }

  // ── Elemanlar ──
  const micBtn     = document.getElementById('mic-btn');
  const statusEl   = document.getElementById('status');
  const finalEl    = document.getElementById('final-text');
  const interimEl  = document.getElementById('interim');
  const vuBar      = document.getElementById('vu-bar');
  const output     = document.getElementById('output');
  const langSelect = document.getElementById('lang-select');
  const fontSlider = document.getElementById('font-slider');

  let isRunning  = false;
  let recognition = null;
  let restartTimer = null;
  let finalText  = '';

  // VU metre
  let audioCtx = null, analyser = null, micStream = null, animFrame = null;

  // ── Font Ayarı ──
  fontSlider.addEventListener('input', () => {
    output.style.fontSize = fontSlider.value + 'px';
  });

  // ── Temizle ──
  document.getElementById('clear-btn').addEventListener('click', () => {
    finalText = '';
    finalEl.textContent  = '';
    interimEl.textContent = '';
  });

  // ── Mikrofon Butonu ──
  micBtn.addEventListener('click', () => {
    if (isRunning) stopAll();
    else startAll();
  });

  // ── Başlat ──
  function startAll() {
    if (!SR) return;
    isRunning = true;
    micBtn.classList.add('active');
    setStatus('🔴 Dinleniyor...', 'on');
    startVU();
    startRecognition();
  }

  // ── Durdur ──
  function stopAll() {
    isRunning = false;
    micBtn.classList.remove('active');
    setStatus('Başlamak için dokun', '');
    interimEl.textContent = '';
    clearTimeout(restartTimer);
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      recognition = null;
    }
    stopVU();
  }

  // ── Recognition Başlat (Android uyumlu: continuous=false, elle döngü) ──
  function startRecognition() {
    if (!isRunning) return;
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      recognition = null;
    }

    const r = new SR();
    recognition = r;

    r.lang = langSelect.value;
    r.continuous      = false;   // Android'de true güvenilmez
    r.interimResults  = true;
    r.maxAlternatives = 1;

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalText += t + '\n';
        } else {
          interim = t;
        }
      }
      finalEl.textContent   = finalText;
      interimEl.textContent = interim;
      output.scrollTop = output.scrollHeight;
    };

    r.onerror = (e) => {
      // network: internet yok | not-allowed: izin yok | no-speech: sessizlik (normal)
      if (e.error === 'not-allowed') {
        setStatus('⚠ Mikrofon izni verilmedi', 'err');
        stopAll();
        return;
      }
      if (e.error === 'network') {
        setStatus('⚠ İnternet bağlantısı gerekli', 'err');
        stopAll();
        return;
      }
      // Diğer hatalar (no-speech vb.) → devam et
      setStatus('🔴 Dinleniyor...', 'on');
    };

    r.onend = () => {
      interimEl.textContent = '';
      if (!isRunning) return;
      // Kısa bekleme ile yeniden başlat (Android'de hemen başlatmak sorun çıkarır)
      restartTimer = setTimeout(startRecognition, 300);
    };

    try {
      r.start();
    } catch(e) {
      restartTimer = setTimeout(startRecognition, 500);
    }
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = cls;
  }

  // ── VU Metre ──
  function startVU() {
    if (!navigator.mediaDevices) return;
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(stream => {
        micStream = stream;
        audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        const buf = new Uint8Array(analyser.frequencyBinCount);
        (function draw() {
          animFrame = requestAnimationFrame(draw);
          analyser.getByteFrequencyData(buf);
          const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
          vuBar.style.width = Math.min(avg / 100 * 100, 100) + '%';
        })();
      })
      .catch(() => { /* VU olmadan devam et */ });
  }

  function stopVU() {
    if (animFrame)  cancelAnimationFrame(animFrame);
    if (micStream)  micStream.getTracks().forEach(t => t.stop());
    if (audioCtx)   audioCtx.close();
    vuBar.style.width = '0%';
    audioCtx = analyser = micStream = animFrame = null;
  }
</script>
</body>
</html>
