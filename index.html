<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GodMaster Mobile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff00;
      --green-dim: #007700;
      --bg: #0a0a0a;
      --bar: #1a1a1a;
      --border: #2a2a2a;
    }

    html, body {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* iOS safe area */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Üst Bar ── */
    #topbar {
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #topbar h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 1px;
      flex: 1;
    }
    select {
      background: #2a2a2a;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 5px 6px;
      font-size: 12px;
      -webkit-appearance: none;
      appearance: none;
    }
    #clear-btn {
      background: #2a2a2a;
      color: #ff5555;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #clear-btn:active { background: #3a1a1a; }

    /* ── VU Metre ── */
    #vu-wrap { height: 4px; background: #111; flex-shrink: 0; }
    #vu-bar  { height: 4px; width: 0%; background: var(--green); transition: width 0.08s linear; }

    /* ── Çıktı ── */
    #output {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.7;
      word-break: break-word;
    }
    #interim { color: var(--green-dim); font-style: italic; }

    /* ── Font Slider ── */
    #font-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #111;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #font-wrap label { font-size: 11px; color: #555; white-space: nowrap; }
    #font-slider { flex: 1; accent-color: var(--green); height: 20px; }

    /* ── Alt Kontrol ── */
    #controls {
      background: var(--bar);
      border-top: 1px solid var(--border);
      padding: 14px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--green);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      /* iOS dokunma efektlerini kaldır */
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      touch-action: manipulation;
    }
    #mic-btn.active {
      background: #002200;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #mic-btn svg { width: 34px; height: 34px; fill: var(--green); pointer-events: none; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px #00ff0033; }
      50%      { box-shadow: 0 0 28px #00ff0099; }
    }

    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      line-height: 1.5;
      min-height: 18px;
    }
    #status.on  { color: #00cc00; }
    #status.err { color: #ff4444; }
    #status.warn{ color: #ffaa00; }

    /* ── Platform etiketi ── */
    #platform-badge {
      position: fixed;
      top: 6px;
      right: 8px;
      font-size: 9px;
      color: #333;
      pointer-events: none;
    }

    /* ── Destek yok ── */
    #no-support {
      display: none;
      padding: 40px 24px;
      text-align: center;
      color: #ff4444;
      font-size: 14px;
      line-height: 2;
    }
    #no-support b { color: var(--green); }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🎮 GodMaster</h1>
  <select id="lang-select">
    <option value="tr-TR" selected>🇹🇷 Türkçe</option>
    <option value="en-US">🇺🇸 English</option>
    <option value="de-DE">🇩🇪 Deutsch</option>
    <option value="es-ES">🇪🇸 Español</option>
    <option value="fr-FR">🇫🇷 Français</option>
  </select>
  <button id="clear-btn">Temizle</button>
</div>

<div id="vu-wrap"><div id="vu-bar"></div></div>

<div id="output">
  <span id="final-text"></span><span id="interim"></span>
</div>

<div id="font-wrap">
  <label>Yazı:</label>
  <input type="range" id="font-slider" min="14" max="36" value="20" />
</div>

<div id="controls">
  <div id="mic-btn" role="button" aria-label="Mikrofon">
    <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg>
  </div>
  <div id="status">Başlamak için dokun</div>
</div>

<div id="no-support">
  ⚠️ Tarayıcınız ses tanımayı desteklemiyor.<br/>
  <b>Android</b> → Chrome kullanın<br/>
  <b>iPhone/iPad</b> → Safari kullanın<br/><br/>
  İnternet bağlantısı gereklidir.
</div>

<div id="platform-badge"></div>

<script>
(function () {
  'use strict';

  // ── Platform Tespiti ──
  const ua = navigator.userAgent;
  const isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/.test(ua);
  const isSafari  = /^((?!chrome|android).)*safari/i.test(ua);

  document.getElementById('platform-badge').textContent =
    isIOS ? 'iOS' : isAndroid ? 'Android' : 'Desktop';

  // ── Speech Recognition ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    document.getElementById('no-support').style.display  = 'block';
    document.getElementById('controls').style.display    = 'none';
    document.getElementById('font-wrap').style.display   = 'none';
  }

  // ── Elemanlar ──
  const micBtn     = document.getElementById('mic-btn');
  const statusEl   = document.getElementById('status');
  const finalEl    = document.getElementById('final-text');
  const interimEl  = document.getElementById('interim');
  const vuBar      = document.getElementById('vu-bar');
  const output     = document.getElementById('output');
  const langSelect = document.getElementById('lang-select');
  const fontSlider = document.getElementById('font-slider');

  // ── Durum ──
  let isRunning     = false;
  let recognition   = null;
  let restartTimer  = null;
  let ignoreOnEnd   = false;
  let finalText     = '';

  // VU metre
  let audioCtx = null, analyser = null, micStream = null, animFrame = null;

  // ── Font ──
  fontSlider.addEventListener('input', () => {
    output.style.fontSize = fontSlider.value + 'px';
  });

  // ── Temizle ──
  document.getElementById('clear-btn').addEventListener('click', () => {
    finalText = '';
    finalEl.textContent  = '';
    interimEl.textContent = '';
  });

  // ── Mikrofon butonu: hem touch hem click ──
  micBtn.addEventListener('touchend', (e) => {
    e.preventDefault();   // ghost click önle
    toggleMic();
  });
  micBtn.addEventListener('click', toggleMic);

  function toggleMic() {
    if (isRunning) stopAll();
    else startAll();
  }

  // ── BAŞLAT ──
  function startAll() {
    if (!SR) return;
    isRunning = true;
    micBtn.classList.add('active');
    setStatus('🔴 Dinleniyor...', 'on');
    startVU();
    createAndStart();
  }

  // ── DURDUR ──
  function stopAll() {
    isRunning    = false;
    ignoreOnEnd  = true;
    micBtn.classList.remove('active');
    setStatus('Başlamak için dokun', '');
    interimEl.textContent = '';
    clearTimeout(restartTimer);
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      recognition = null;
    }
    stopVU();
    // Bir sonraki başlatmada ignoreOnEnd temizlensin
    setTimeout(() => { ignoreOnEnd = false; }, 500);
  }

  // ── Recognition Oluştur & Başlat ──
  function createAndStart() {
    if (!isRunning) return;

    // Öncekini temizle
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      recognition = null;
    }

    const r = new SR();
    recognition = r;

    r.lang = langSelect.value;

    // iOS Safari: continuous=true daha kararlı
    // Android Chrome: continuous=false + elle döngü daha kararlı
    r.continuous      = isIOS ? true : false;
    r.interimResults  = true;
    r.maxAlternatives = 1;

    r.onstart = () => {
      setStatus('🔴 Dinleniyor...', 'on');
    };

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalText += t + '\n';
        } else {
          interim = t;
        }
      }
      finalEl.textContent   = finalText;
      interimEl.textContent = interim;
      output.scrollTop = output.scrollHeight;
    };

    r.onerror = (e) => {
      const err = e.error;

      if (err === 'not-allowed' || err === 'service-not-allowed') {
        setStatus('⚠ Mikrofon izni reddedildi', 'err');
        stopAll();
        return;
      }
      if (err === 'network') {
        setStatus('⚠ İnternet bağlantısı gerekli', 'err');
        stopAll();
        return;
      }
      if (err === 'audio-capture') {
        setStatus('⚠ Mikrofon bulunamadı', 'err');
        stopAll();
        return;
      }
      // aborted / no-speech → normal, devam et
    };

    r.onend = () => {
      interimEl.textContent = '';
      if (!isRunning || ignoreOnEnd) return;

      // iOS: onend geldi ama hâlâ çalışıyor olabilir, kısa bekle
      // Android: hemen yeniden başlatmak hata verir, 300ms bekle
      const delay = isIOS ? 150 : 300;
      restartTimer = setTimeout(createAndStart, delay);
    };

    // iOS'ta AudioContext kullanıcı etkileşimi olmadan başlamaz,
    // bu yüzden recognition.start() touch event içinden çağrılıyor — sorun yok.
    try {
      r.start();
    } catch (e) {
      // Zaten çalışıyorsa veya başka hata — kısa süre sonra dene
      restartTimer = setTimeout(createAndStart, 400);
    }
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = cls || '';
  }

  // ── VU Metre (Web Audio API) ──
  function startVU() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(stream => {
        micStream = stream;
        // iOS Safari'de AudioContext user gesture olmadan başlamayabilir
        // ama burada zaten kullanıcı dokundu, güvenli
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        audioCtx = new AC();

        // iOS'ta context suspended başlayabilir
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        audioCtx.createMediaStreamSource(stream).connect(analyser);

        const buf = new Uint8Array(analyser.frequencyBinCount);
        function draw() {
          animFrame = requestAnimationFrame(draw);
          analyser.getByteFrequencyData(buf);
          const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
          vuBar.style.width = Math.min(avg / 100 * 100, 100) + '%';
        }
        draw();
      })
      .catch(() => {
        // VU çalışmazsa sessizce geç, tanıma devam eder
      });
  }

  function stopVU() {
    if (animFrame)  cancelAnimationFrame(animFrame);
    if (micStream)  micStream.getTracks().forEach(t => t.stop());
    if (audioCtx)   try { audioCtx.close(); } catch(e) {}
    vuBar.style.width = '0%';
    audioCtx = analyser = micStream = animFrame = null;
  }

  // ── Sayfa gizlenince durdur (iOS arka plan kısıtı) ──
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && isRunning) {
      setStatus('⏸ Arka planda duraklatıldı', 'warn');
      if (recognition) try { recognition.abort(); } catch(e) {}
    } else if (!document.hidden && isRunning) {
      setStatus('🔴 Dinleniyor...', 'on');
      clearTimeout(restartTimer);
      restartTimer = setTimeout(createAndStart, 300);
    }
  });

})();
</script>
</body>
</html>
